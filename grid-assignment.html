<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Assignment</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            max-width: 300px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(5,70px);
            grid-template-rows: 70px 70px 70px ;
            gap: 20px;
        }
        .container > *{
            border-radius: 20px;
        }
        .item1{
          grid-column: 1/3;
          grid-row: 1/3;
          background-color: black;
        }
        .item2{
            grid-column: 3/6;
            background-color: aqua;
        }
        .item3{
           grid-column: 3/5 ;
           grid-row: 2/4;
           background-color: yellow;
        }
        .item4{
            grid-column: 5/6;
            background-color: brown;
        }
        .item5{
            grid-column: 5/6;
            background-color: grey;
        }
        .item6{
            grid-column: 1/3;
            grid-row: 3/4;
            background-color: hotpink;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
    </div>
</body>
</html>
