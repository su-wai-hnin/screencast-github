<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Area</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .container{
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(5,80px);
            grid-template-rows: 80px 80px 80px;
            gap: 15px;
            grid-template-areas: 
            "one one two two two"
            "one one three three four"
            "six six three three five";
         }
         .container >*{
            border-radius: 20px;
         }
         .item1{
            grid-area: one;
            background-color: black;
         }
         .item2{
            grid-area: two;
            background-color: violet;
         }
         .item3{
            grid-area: three;
            background-color: aqua;
         }
         .item4{
            grid-area: four;
            background-color: hotpink;
         }
         .item5{
            grid-area: five;
            background-color: yellow;
         }
        .item6{
            grid-area: six;
            background-color: blueviolet;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>
    </div>
</body>
</html>
